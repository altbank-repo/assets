<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Atualização de Endereço - Payjoy (Final v4)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: fixed;
            overflow: hidden;
            background-color: transparent !important;
            font-family: var(--font-secundaria);
        }

        .main-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            overflow: hidden;
            transition: align-items 0.2s ease, padding-top 0.2s ease;
        }

        .cover-container {
            width: 90%;
            max-width: 400px;
            height: auto;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--Brand-Neutral-White);
            border-radius: var(--Radius-16);
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .cover-container.intro-mode {
            width: 90% !important;
            max-width: 400px !important;
            margin: auto;
            border-radius: 16px !important;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            padding: 8px 8px 0 0;
            flex-shrink: 0;
            background: var(--Brand-Neutral-White);
            border-top-left-radius: var(--Radius-16);
            border-top-right-radius: var(--Radius-16);
        }

        .close-btn {
            width: 40px;
            height: 40px;
            padding: 10px;
            opacity: 0.5;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-btn img {
            width: 20px;
            height: 20px;
            display: block;
        }

        .slide {
            display: none;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            padding: 0 4px 16px 24px;
        }

        .slide.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .form-content {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
            overscroll-behavior-y: contain;
            padding-right: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-actions {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 16px;
            padding-top: 10px;
            background: var(--Brand-Neutral-White);
            padding-right: 24px;
        }

        .title {
            color: var(--App-Interaction-Primary-Text);
            text-align: left;
            margin: 0 0 30px 0;
            padding-right: 24px;
        }

        #t-intro {
            padding-right: 0 !important;
        }

        label,
        .rev-label {
            display: block;
            color: var(--Brand-Neutral-Black-Light);
            margin-bottom: 6px;
            font-family: var(--font-secundaria);
            font-size: 14px;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 1px solid var(--Brand-Neutral-Grey);
            border-radius: var(--Radius-4);
            background: transparent;
            font-family: var(--font-secundaria);
            font-size: 16px !important;
            font-weight: 400;
            line-height: 1.3;
            color: var(--App-Interaction-Primary-Text);
            -webkit-appearance: none;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
            resize: none;
            padding-right: 12px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 1px solid var(--Brand-Neutral-Black-Dark) !important;
            outline: none;
        }

        input.input-error,
        textarea.input-error {
            border: 1px solid var(--Brand-Status-Red-Red) !important;
        }

        ::placeholder {
            opacity: 1;
            color: var(--Brand-Neutral-Grey-Darker);
        }

        input:disabled,
        input[readonly].system-disabled,
        .system-disabled {
            border: 1px solid var(--Brand-Neutral-Grey) !important;
            background-color: var(--Brand-Neutral-Grey-Light) !important;
            color: var(--Brand-Neutral-Black-Lighter) !important;
            cursor: default !important;
            pointer-events: none !important;
            -webkit-text-fill-color: var(--Brand-Neutral-Black-Lighter) !important;
            opacity: 1;
        }

        .system-disabled:focus,
        input:disabled:focus {
            border: 1px solid var(--Brand-Neutral-Grey) !important;
            outline: none !important;
            box-shadow: none !important;
        }

        .char-count-msg {
            color: var(--Brand-Status-Red-Red);
            margin-top: 6px;
            display: none;
        }

        .error-msg {
            color: var(--Brand-Status-Red-Red);
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: center;
        }

        .main-wrapper.keyboard-open {
            align-items: center !important;
            padding-bottom: 0 !important;
            padding-top: env(safe-area-inset-top, 10px) !important;
        }

        .main-wrapper.keyboard-open .cover-container {
            max-height: 100% !important;
            border-radius: var(--Radius-16) !important;
        }

        .info-text {
            color: var(--App-Interaction-Secondary-Text);
            font-style: italic;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .autocomplete-suggestions::-webkit-scrollbar {
            width: 4px;
        }

        .autocomplete-suggestions::-webkit-scrollbar-thumb {
            background-color: #CCC;
            border-radius: 10px;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--Brand-Neutral-White);
            border-radius: var(--Radius-4);
            z-index: 1000;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: var(--Shadow-Dropdown-Menu);
        }

        .suggestion-item {
            padding: 16px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--Brand-Neutral-Grey-Light);
        }

        .suggestion-item:hover {
            background-color: var(--Brand-Neutral-Grey-Lighter);
        }

        .suggestion-item b {
            color: var(--App-Interaction-Primary-Text);
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .suggestion-item span {
            color: var(--App-Interaction-Secondary-Text);
            display: block;
            font-size: 12px;
        }

        .suggestion-item .search-cep-item {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
            color: #000;
            font-weight: 700;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            font-family: var(--font-secundaria);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.3;
            color: var(--App-Interaction-Primary-Text);
            cursor: pointer;
            user-select: none;
            width: fit-content;
        }

        .checkbox-group input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            background-color: transparent;
            background-image: var(--img-checkbox-square);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background-color: transparent;
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 7px;
            background-image: var(--img-checkbox-check);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            display: block;
        }

        .checkbox-group input[type="checkbox"]:focus,
        .checkbox-group input[type="checkbox"]:active {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        .cep-edit-container,
        .search-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pencil-btn,
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .spinner-loader {
            width: 18px;
            height: 18px;
            border: 2px solid var(--Brand-Neutral-Grey-Light);
            border-top-color: var(--Brand-Neutral-Black-Lighter);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            right: 12px;
            top: 50%;
            margin-top: -9px;
            z-index: 11;
            display: none;
        }

        .pencil-btn img {
            width: 24px;
            height: 24px;
            opacity: 1;
            filter: brightness(1);
        }

        #inputCepDisplay,
        #searchRua {
            padding-right: 30px;
        }

        #inputCepDisplay {
            background-color: transparent !important;
            color: var(--App-Interaction-Primary-Text) !important;
            cursor: pointer;
            border-color: var(--Brand-Neutral-Grey);
            pointer-events: auto;
        }

        #rev_cep,
        #rev_num,
        #rev_comp,
        #rev_ref,
        #rev_transporte,
        #rev_rua:not(.system-disabled),
        #rev_bairro:not(.system-disabled),
        #rev_cidade:not(.system-disabled),
        #rev_uf:not(.system-disabled) {
            background-color: transparent !important;
            color: var(--App-Interaction-Primary-Text) !important;
            cursor: pointer;
            border-color: var(--Brand-Neutral-Grey);
            pointer-events: auto;
        }

        .clear-btn img {
            width: 18px;
            height: 18px;
            opacity: 0.6;
            display: block;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            border: 1px solid var(--Brand-Neutral-Grey);
            margin-top: -1px;
            cursor: pointer;
            background-color: var(--Brand-Neutral-White);
            transition: background-color 0.2s;
            position: relative;
        }

        .radio-option:first-child {
            border-top-left-radius: var(--Radius-4);
            border-top-right-radius: var(--Radius-4);
            margin-top: 0;
        }

        .radio-option:last-child {
            border-bottom-left-radius: var(--Radius-4);
            border-bottom-right-radius: var(--Radius-4);
        }

        .radio-option.selected {
            background-color: var(--Brand-Accent-Accent-Lighter-Extra);
            z-index: 1;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .custom-radio-circle {
            width: 18px;
            height: 18px;
            border: 2px solid var(--Brand-Neutral-Grey-Darker);
            border-radius: 50%;
            margin-right: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            flex-shrink: 0;
        }

        .custom-radio-circle::after {
            content: '';
            width: 6px;
            height: 6px;
            background-color: var(--Brand-Neutral-Black);
            border-radius: 50%;
            display: none;
        }

        .radio-option.selected .custom-radio-circle {
            border-color: var(--Brand-Neutral-Black);
        }

        .radio-option.selected .custom-radio-circle::after {
            display: block;
        }

        .radio-text {
            font-family: var(--font-secundaria);
            font-size: 16px;
            font-weight: 400;
            color: var(--App-Interaction-Primary-Text);
        }

        .review-box {
            background: var(--Brand-Neutral-Grey-Light);
            border-radius: var(--Radius-8);
            padding: 16px;
        }

        .review-item {
            display: flex;
            flex-direction: column;
            border-bottom: none;
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .review-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .cta-primary {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--App-Buttons-Primary-Action);
            color: var(--App-Buttons-On-Primary-Action);
            font-family: var(--font-secundaria);
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            border-radius: var(--Radius-100);
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: none;
        }

        .cta-primary:disabled {
            background-color: var(--Brand-Neutral-Grey-Light) !important;
            color: var(--Brand-Neutral-Grey-Darker) !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-link-edit {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-secundaria);
            font-size: 16px;
            font-weight: 700;
            width: fit-content;
            padding: 14px 20px;
            margin: 0 auto;
            border-radius: var(--Radius-100);
            border: none;
            cursor: pointer;
            text-transform: none;
            background-color: var(--Brand-Neutral-Grey-Light);
            color: var(--Brand-Neutral-Black);
        }

        .btn-link-edit:disabled {
            color: var(--Brand-Neutral-Grey-Darker) !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        .help-link {
            display: block;
            text-align: left;
            margin-top: 10px;
            text-decoration: none;
            cursor: pointer;
            color: var(--App-Interaction-Link);
            font-family: var(--font-secundaria);
            font-size: 14px;
            font-weight: 500;
        }

        .help-link.disabled {
            color: var(--Brand-Neutral-Black-Lighter) !important;
            pointer-events: none;
            opacity: 1;
            cursor: default;
        }

        .btn-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--Brand-Neutral-Grey-Light);
            border-top-color: var(--Brand-Neutral-Black-Lighter);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        .img-load-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-load-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--Brand-Neutral-Grey-Light);
            border-top-color: var(--Brand-Neutral-Black-Lighter);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            pointer-events: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-box {
            width: 85%;
            max-width: 320px;
            background: var(--Brand-Neutral-White);
            border-radius: var(--Radius-16);
            padding: 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-title {
            font-family: var(--font-principal);
            font-size: 20px;
            font-weight: 600;
            color: var(--App-Interaction-Primary-Text);
            margin: 0 0 12px 0;
        }

        .modal-msg {
            font-family: var(--font-secundaria);
            font-size: 15px;
            color: var(--App-Interaction-Secondary-Text);
            line-height: 1.5;
            margin: 0 0 24px 0;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-container {
            height: 4px;
            background-color: var(--Brand-Neutral-Grey);
            margin: 0 24px 20px 24px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--Brand-Action-Action);
            width: 0%;
            transition: width 0.3s ease;
        }

        #step2-address-context {
            display: none;
            color: var(--Brand-Neutral-Black-Light);
            margin-top: 0;
            margin-bottom: 8px;
            padding-right: 24px;
            font-weight: 500;
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px !important;
        }

        #t-step7 {
            padding-right: 0 !important;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <div class="cover-container intro-mode">
            <div id="exitModal" class="modal-overlay">
                <div class="modal-box">
                    <h3 class="modal-title" id="mod-title"></h3>
                    <p class="modal-msg" id="mod-msg"></p>
                    <div class="modal-actions">
                        <button class="cta-primary" id="btn-stay" onclick="stayOnApp()"></button>
                        <button class="btn-link-edit" id="btn-exit" onclick="handleExitClick()"></button>
                    </div>
                </div>
            </div>

            <header class="header">
                <button class="close-btn" onclick="tryClose()">
                    <img id="imgClose" src="" alt="Fechar">
                </button>
            </header>

            <div id="progBarBox" class="progress-container">
                <div id="progBarFill" class="progress-bar-fill"></div>
            </div>

            <div class="slide active" id="stepIntro">
                <div class="form-content"
                    style="text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                    <h1 class="title heading-4-regular" id="t-intro" style="text-align: center; margin-bottom: 20px;">
                    </h1>
                    <div class="img-load-wrapper" id="wrapIntro"
                        style="width: 100%; min-height: 30px; margin-bottom: 24px;">
                        <div class="img-load-spinner"></div>
                        <img id="imgIntro" src=""
                            style="width: 100%; height: auto; opacity: 0; transition: opacity 0.3s;">
                    </div>
                    <p id="d-intro" class="body-1-regular"
                        style="text-align: center; color: var(--App-Interaction-Primary-Text); margin: 0;"></p>
                </div>
                <div class="footer-actions">
                    <button id="btnIntroPri" class="cta-primary" onclick="handleIntroPrimary()"></button>
                </div>
            </div>

            <div class="slide" id="step0">
                <div class="form-content">
                    <h1 class="title heading-4-regular" id="t-step0"></h1>
                    <div class="form-group">
                        <input type="tel" id="inputCepOrigin" maxlength="8" oninput="handleCepInput(this)"
                            onclick="handleUserCepClick(this)">
                        <span class="help-link link-medium" id="l-dontknow" onclick="handleDontKnowCep()"></span>
                    </div>
                </div>
                <div class="footer-actions">
                    <div id="cepFeedback" class="error-msg body-2-medium" style="margin: 0; text-align: center;"></div>

                    <button id="btnCepContinuar" class="cta-primary" onclick="fetchCep()" disabled></button>
                </div>
            </div>

            <div class="slide" id="stepSearch">
                <h1 class="title heading-4-regular" id="t-stepSearch"></h1>
                <div class="form-content">
                    <div class="form-group" style="position: relative;">
                        <label id="lbl-uf" class="body-2-regular"></label>
                        <input type="text" id="inputUFDisplay" maxlength="2" oninput="handleStateInput(this)"
                            onfocus="openStateDropdown()" onclick="openStateDropdown()" autocomplete="off">
                        <div id="stateList" class="autocomplete-suggestions" style="display:none;"></div>
                    </div>
                    <div class="form-group">
                        <label id="lbl-city" class="body-2-regular"></label>
                        <input type="text" id="searchCidade" autocomplete="off" oninput="handleCityInput(this)">
                        <div id="citySuggestions" class="autocomplete-suggestions" style="display:none;"></div>
                    </div>
                    <div class="form-group">
                        <label id="lbl-street-search" class="body-2-regular"></label>
                        <div class="search-input-container">
                            <input type="text" id="searchRua" autocomplete="off" oninput="handleStreetInput(this)"
                                onfocus="handleStreetFocus(this)">
                            <button id="btnClearStreet" class="clear-btn" onclick="clearStreetField()">
                                <img id="imgClear" src="" alt="Limpar">
                            </button>
                            <div id="loaderStreet" class="spinner-loader"></div>
                        </div>
                        <div id="streetSuggestions" class="autocomplete-suggestions" style="display:none;"></div>
                    </div>
                </div>
                <div class="footer-actions">
                    <button class="cta-primary" id="btnExecSearch" onclick="proceedFromSearch()" disabled></button>
                    <button class="btn-link-edit" id="btnBackSearch" onclick="goToStep(0)"></button>
                </div>
            </div>

            <div class="slide" id="step1">
                <h1 class="title heading-4-regular" id="t-step1"></h1>
                <div class="form-content">
                    <div class="form-group">
                        <label id="lbl-cep" class="body-2-regular"></label>
                        <div class="cep-edit-container">
                            <input type="text" id="inputCepDisplay" readonly onclick="goToStep(0)"
                                onmousedown="event.preventDefault()">

                            <button class="pencil-btn" onclick="goToStep(0)">
                                <img id="imgEdit" src="" alt="Editar">
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label id="lbl-street" class="body-2-regular"></label>
                        <input type="text" id="inputRua" oninput="validateStep1()" onfocus="scrollToInput('inputRua')"
                            onclick="scrollToInput('inputRua')">
                    </div>
                    <div class="form-group">
                        <label id="lbl-neigh" class="body-2-regular"></label>
                        <input type="text" id="inputBairro" oninput="validateStep1()"
                            onfocus="scrollToInput('inputBairro')" onclick="scrollToInput('inputBairro')">
                    </div>
                    <div class="row">
                        <div style="flex:3;">

        var ctTrackEvent = function (eventName, props) {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isIOS) {
                try {
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.clevertap) {
                        window.webkit.messageHandlers.clevertap.postMessage({
                            action: 'recordEventWithProps',
                            event: eventName,
                            properties: props // iOS aceita o objeto diretamente
                        });
                    }
                } catch (e) { console.error("Erro no tracking iOS", e); }
            } else {
                try {
                    if (window.CleverTap && typeof window.CleverTap.pushEvent === "function") {
                        window.CleverTap.pushEvent(eventName, JSON.stringify(props));
                    }
                } catch (e) { console.error("Erro no tracking Android", e); }
            }
        };

        function goToStep(idx) {
            const closeBtn = document.querySelector('.close-btn');

            if (closeBtn) {
                if (idx === 7) {
                    closeBtn.style.visibility = 'hidden';
                } else {
                    closeBtn.style.visibility = 'visible';
                }
            }

            const progBox = document.getElementById('progBarBox');
            const progFill = document.getElementById('progBarFill');

            const progressMap = {
                0: '15%',
                'Search': '15%',
                1: '30%',
                2: '45%',
                3: '60%',
                4: '75%',
                5: '90%',
                6: '100%'
            };

            if (progressMap[idx] !== undefined) {
                progBox.style.display = 'block';
                setTimeout(() => { progFill.style.width = progressMap[idx]; }, 10);
            } else {
                progBox.style.display = 'none';
                progFill.style.width = '0%';
            }

            const forceFocus = (elementId) => {
                const el = document.getElementById(elementId);
                if (!el) return;
                el.focus();
                setTimeout(() => {
                    el.focus();
                    el.click();
                }, 50);
            };

            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));

            let targetId = '';
            if (idx === 'Search') targetId = 'stepSearch';
            else if (idx === 'Intro') targetId = 'stepIntro';
            else targetId = 'step' + idx;

            const targetSlide = document.getElementById(targetId);

            if (targetSlide) {
                targetSlide.classList.add('active');
                void targetSlide.offsetWidth;
                const content = targetSlide.querySelector('.form-content');
                if (content) content.scrollTop = 0;
            }

            if (idx === 0) {
                const inputOrigem = document.getElementById('inputCepOrigin');
                const btn = document.getElementById('btnCepContinuar');
                let valorBruto = (storedCepRaw || inputOrigem.value || "").toString();
                let valorApenasNumeros = valorBruto.replace(/[^0-9]/g, '');

                inputOrigem.value = valorApenasNumeros;
                storedCepRaw = valorApenasNumeros;
                btn.innerHTML = CONFIG.text.step0.btn;
                btn.disabled = (valorApenasNumeros.length !== 8);
                isAutoClick = false;

                forceFocus('inputCepOrigin');
                return;
            }

            if (idx === 'Search') {
                resetSearchScreen();
                forceFocus('inputUFDisplay');
                return;
            }

            if (idx === 1) {
                if (isAddressComplete) {
                    goToStep(0);
                    return;
                }
                validateStep1();

                const ruaInput = document.getElementById('inputRua');
                const bairroInput = document.getElementById('inputBairro');

                if (!ruaInput.hasAttribute('readonly') && ruaInput.value.trim() === "") {
                    forceFocus('inputRua');
                } else if (!bairroInput.hasAttribute('readonly') && bairroInput.value.trim() === "") {
                    forceFocus('inputBairro');
                }
            }

            if (idx === 2) {
                validateStep2();
                const inputNum = document.getElementById('inputNum');
                const chkNoNum = document.getElementById('noNum');

                const contextEl = document.getElementById('step2-address-context');
                if (contextEl) {
                    if (!isOfflineMode && isAddressComplete) {
                        const rua = document.getElementById('inputRua').value;
                        const bairro = document.getElementById('inputBairro').value;
                        contextEl.innerText = `${rua}, ${bairro}`;
                        contextEl.style.display = 'block';
                    } else {
                        contextEl.style.display = 'none';
                    }
                }
            }

            if (idx === 3) { validateStep3(); }

            if (idx === 4) {
                prepareStep4Visuals();
                const inputRef = document.getElementById('inputRef');
                if (inputRef.value.trim() === "") {
                    forceFocus('inputRef');
                }
            }
        }

        async function fetchCep() {
            const cepInput = document.getElementById('inputCepOrigin');
            const originalCep = cepInput.value;
            const linkDontKnow = document.getElementById('l-dontknow');
            const feedbackMsg = document.getElementById('cepFeedback');

            if (originalCep.length !== 8) return;

            const btn = document.getElementById('btnCepContinuar');

            if (feedbackMsg) feedbackMsg.style.display = 'none';
            cepInput.classList.remove('input-error');

            btn.disabled = true;
            btn.innerHTML = 'Buscando <div class="btn-spinner"></div>';

            if (linkDontKnow) linkDontKnow.classList.add('disabled');

            try {
                const r = await fetch(`https://viacep.com.br/ws/${originalCep}/json/`);
                const d = await r.json();

                const currentVal = document.getElementById('inputCepOrigin').value;

                if (currentVal !== originalCep) {
                    if (linkDontKnow) linkDontKnow.classList.remove('disabled'); // Trava removida
                    return;
                }

                if (!d.erro) {
                    if (linkDontKnow) linkDontKnow.classList.remove('disabled'); // Trava removida
                    fillFormAndContinue(d);
                } else {
                    cepInput.classList.add('input-error');
                    if (feedbackMsg) {
                        feedbackMsg.innerText = "CEP não encontrado.";
                        feedbackMsg.style.display = 'block';
                    }
                    btn.innerText = CONFIG.text.step0.btn;
                    btn.disabled = true;
                    if (linkDontKnow) linkDontKnow.classList.remove('disabled'); // Trava removida
                }
            } catch (e) {
                console.error("ViaCEP fora do ar ou sem internet:", e);
                const currentVal = document.getElementById('inputCepOrigin').value;

                if (currentVal === originalCep) {

                    if (apiFailureCount === 1) {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }

                    if (document.getElementById('inputCepOrigin').value !== originalCep) {
                        if (linkDontKnow) linkDontKnow.classList.remove('disabled');
                        return;
                    }

                    apiFailureCount++;

                    cepInput.classList.add('input-error');

                    if (feedbackMsg) {
                        if (apiFailureCount >= 2) {
                            feedbackMsg.innerText = "Erro de conexão.";
                        } else {
                            feedbackMsg.innerText = "Erro na conexão. Verifique sua internet.";
                        }
                        feedbackMsg.style.display = 'block';
                    }

                    if (apiFailureCount >= 2) {
                        viacepApiStatus = "off";
                        btn.innerText = "Inserir manualmente";
                        btn.disabled = false;
                        btn.onclick = enableManualAddressEntry;
                    } else {
                        btn.innerText = "Tentar novamente";
                        btn.disabled = false;
                        btn.onclick = fetchCep;
                    }

                    if (linkDontKnow) linkDontKnow.classList.remove('disabled'); // Trava removida
                } else {
                    if (linkDontKnow) linkDontKnow.classList.remove('disabled'); // Trava removida
                }
            }
        }

            const isRuaInvalida = (logradouro === "" || logradouro === "Sem nome");
            const isBairroInvalido = (bairro === "" || bairro === "Sem bairro");

            if (isRuaInvalida || isBairroInvalido) {

            } else {

            if (!isAddressComplete) {
                titleEl.innerText = "Complete seu endereço";
                btnEl.innerText = "Continuar";
            } else {
                titleEl.innerText = CONFIG.text.step1.title;

                ruaInput.value = "";
                ruaInput.removeAttribute('readonly');

            } else {
                ruaInput.value = logradouro;
                ruaInput.setAttribute('readonly', true);
                ruaInput.classList.add('system-disabled');
                ruaInput.classList.remove('input-error');
            }

            if (isBairroInvalido) {
                bairroInput.value = "";
                bairroInput.removeAttribute('readonly');
                bairroInput.classList.remove('system-disabled');
                bairroInput.classList.remove('input-error');

                bairroInput.value = bairro;
                bairroInput.setAttribute('readonly', true);
                bairroInput.classList.add('system-disabled');
                bairroInput.classList.remove('input-error');
            }

            cidadeInput.value = data.localidade || "";
            cidadeInput.setAttribute('readonly', true);
            cidadeInput.classList.add('system-disabled');

            estadoInput.value = data.uf || "";
            estadoInput.setAttribute('readonly', true);
            estadoInput.classList.add('system-disabled');

            if (!isAddressComplete) {
                goToStep(1);
                validateStep1();
            } else {
                goToStep(2);
            }
        }

        async function confirmAddress() {
            const btn = document.getElementById('btnConfirm');

            const payload = {
                created_at:              new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString().replace('Z', '-03:00'),
                customer_id:             String(CT_INJECTED_IDENTITY || ''),
                "Rastreio Flash":        String(CT_INJECTED_CODIGO_RASTREIO_FLASH || ''),
                "CEP":                   storedCepRaw,
                "Rua":                   document.getElementById('inputRua').value,
                "Número":                document.getElementById('noNum').checked ? "S/N" : document.getElementById('inputNum').value,
                "Complemento":           document.getElementById('noComp').checked ? "Sem complemento" : document.getElementById('inputComp').value,
                "Referência":            document.getElementById('inputRef').value,
                "Rastreio Correios":     String(CT_INJECTED_CODIGO_RASTREIO_CORREIOS || ''),
                "Motivo De Devolucao":   String(CT_INJECTED_MOTIVO_DE_DEVOLUCAO || ''),
                "Bairro":                document.getElementById('inputBairro').value,
                "Cidade":                document.getElementById('inputCidade').value,
                "UF":                    document.getElementById('inputEstado').value,
                "Transporte":            document.querySelector('input[name="transporte"]:checked')?.value || "-",
                viacep:                  isOfflineMode ? "off" : "on"
            };

            btn.disabled = true;
            btn.innerHTML = 'Salvando... <div class="btn-spinner"></div>';

            try {
                // 1. Auth anônima Firebase
                const authRes = await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FIREBASE_API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ returnSecureToken: true })
                    }
                );
                if (!authRes.ok) throw new Error("Firebase auth failed: " + authRes.status);
                const authData = await authRes.json();
                const idToken = authData.idToken;

                // 2. Converter payload para formato de campos do Firestore REST
                function toFirestoreFields(obj) {
                    var fields = {};
                    Object.keys(obj).forEach(function(key) {
                        var val = obj[key];
                        if (typeof val === 'boolean')      fields[key] = { booleanValue: val };
                        else if (typeof val === 'number')  fields[key] = { doubleValue: val };
                        else                               fields[key] = { stringValue: String(val) };
                    });
                    return fields;
                }

                // 3. Salvar documento no Firestore via REST
                const firestoreUrl = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/${CONFIG.api.collection}`;
                const saveRes = await fetch(firestoreUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + idToken
                    },
                    body: JSON.stringify({ fields: toFirestoreFields(payload) })
                });
                if (!saveRes.ok) throw new Error("Firestore save failed: " + saveRes.status);

                wasSaveSuccessful = true;
                finishSuccess(payload);

            } catch (error) {
                console.error('Erro ao salvar no Firestore:', error);
                wasSaveSuccessful = false;
                finishSuccess(payload);
            }
        }

            const btn = document.getElementById('btnConfirm');
            btn.innerHTML = CONFIG.text.step6.btn;

            const titleEl = document.getElementById('t-step7');

            if (wasSaveSuccessful) {

                resetAndLoadImg('imgSuccess', CONFIG.images.success, 'wrapSuccess');
                ctaEl.innerText = CONFIG.text.step7.btn;
            } else {
                titleEl.innerText = CONFIG.text.step7.titleError;
                msgEl.innerText = CONFIG.text.step7.msgError;
                msgEl.style.color = "var(--Brand-Status-Red-Red)";
                resetAndLoadImg('imgSuccess', CONFIG.images.error || CONFIG.images.close, 'wrapSuccess');
                ctaEl.innerText = CONFIG.text.step7.btnError;
            }

            goToStep(7);
        }

        function normalizeStr(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : ""; }

        function scrollToInput(elementId) {
            setTimeout(() => {
                const el = document.getElementById(elementId);
                if (!el) return;
                const parent = el.closest('.form-group');
                const dropdown = parent ? parent.querySelector('.autocomplete-suggestions') : null;
                const isDropdownOpen = dropdown && dropdown.style.display === 'block';
                if (isDropdownOpen) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
                else { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }, 400);
        }

        function openStateDropdown() {
            const list = document.getElementById('stateList');
            const inputVal = normalizeStr(document.getElementById('inputUFDisplay').value);
            list.innerHTML = '';

            const filteredStates = statesData.filter(st => normalizeStr(st.s).startsWith(inputVal));

            if (filteredStates.length === 0) {
                list.innerHTML = '<div class="suggestion-item" style="cursor: default;"><i>Estado não encontrado.</i></div>';
                list.style.display = 'block';
                return;
            }

            filteredStates.forEach(st => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<b>${st.s}</b>`;
                div.onclick = (e) => { e.stopPropagation(); selectState(st.s); };
                list.appendChild(div);
            });

            list.style.display = 'block';
            scrollToInput('inputUFDisplay');
        }

        function handleStateInput(el) {
            el.value = el.value.toUpperCase().replace(/[^A-Z]/g, '');
            const val = el.value;
            if (val === '') {
                resetFieldsBelowState();
                openStateDropdown();
                return;
            }
            if (val.length === 2) {
                const estadoValido = statesData.find(st => st.s === val);
                if (estadoValido) { selectState(val); return; }
            }
            openStateDropdown();
        }

        function openStateDropdownStep1() {
            const input = document.getElementById('inputEstado');
            if (input.hasAttribute('readonly')) return;

            const list = document.getElementById('stateListStep1');
            const inputVal = normalizeStr(input.value);
            list.innerHTML = '';

            const filteredStates = statesData.filter(st => normalizeStr(st.s).startsWith(inputVal));

            if (filteredStates.length === 0) {
                list.innerHTML = '<div class="suggestion-item" style="cursor: default;"><i>Estado não encontrado.</i></div>';
                list.style.display = 'block';
                return;
            }

            filteredStates.forEach(st => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<b>${st.s}</b>`;
                div.onclick = (e) => { e.stopPropagation(); selectStateStep1(st.s); };
                list.appendChild(div);
            });

            list.style.display = 'block';
            scrollToInput('inputEstado');
        }

        function handleStateInputStep1(el) {
            el.value = el.value.toUpperCase().replace(/[^A-Z]/g, '');
            validateStep1(); // Atualiza a validação do botão

            const val = el.value;
            if (val === '') {
                openStateDropdownStep1();
                return;
            }
            if (val.length === 2) {
                const estadoValido = statesData.find(st => st.s === val);
                if (estadoValido) { selectStateStep1(val); return; }
            }
            openStateDropdownStep1();
        }

        function selectStateStep1(uf) {
            document.getElementById('inputEstado').value = uf;
            document.getElementById('stateListStep1').style.display = 'none';
            validateStep1();
            document.getElementById('inputEstado').blur(); // Fecha o teclado
        }

        function selectState(uf) {
            document.getElementById('inputUFDisplay').value = uf;
            document.getElementById('stateList').style.display = 'none';
            document.getElementById('searchCidade').value = '';
            document.getElementById('searchRua').value = '';
            const cityInput = document.getElementById('searchCidade');
            const ruaInput = document.getElementById('searchRua');
            cityInput.disabled = false;
            ruaInput.disabled = true;
            cityInput.focus();
            scrollToInput('searchCidade');
            fetchCities(uf);
        }

        function resetFieldsBelowState() {
            const c = document.getElementById('searchCidade');
            const r = document.getElementById('searchRua');
            c.value = ''; r.value = '';
            c.disabled = true; r.disabled = true;
        }

        async function fetchCities(uf) {
            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const data = await r.json();
                citiesList = data.map(c => c.nome);
                searchFailureCount = 0; // Zera se der sucesso
            } catch (e) {
                handleSearchError('city', uf);
            }
        }

        function handleCityInput(el) {
            const val = normalizeStr(el.value);
            const suggestions = document.getElementById('citySuggestions');
            suggestions.innerHTML = '';

            if (val.length === 0) {
                const rua = document.getElementById('searchRua');
                rua.value = '';
                rua.disabled = true;
                document.getElementById('btnClearStreet').style.display = 'none';
                suggestions.style.display = 'none';
                return;
            }

            if (val.length < 2) { suggestions.style.display = 'none'; return; }

            const filtered = citiesList.filter(c => normalizeStr(c).includes(val)).slice(0, 10);

            if (filtered.length > 0) {
                filtered.forEach(city => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = city;
                    div.onclick = (e) => {
                        e.stopPropagation();
                        el.value = city;
                        suggestions.style.display = 'none';
                        checkUniqueCep(document.getElementById('inputUFDisplay').value, city);
                    };
                    suggestions.appendChild(div);
                });
                suggestions.style.display = 'block';
                scrollToInput('searchCidade');
            } else {
                suggestions.innerHTML = '<div class="suggestion-item" style="cursor: default;"><i>Cidade não encontrada.</i></div>';
                suggestions.style.display = 'block';
            }
        }

        async function checkUniqueCep(uf, city) {
            const ruaInput = document.getElementById('searchRua');
            const btnClear = document.getElementById('btnClearStreet');
            const loader = document.getElementById('loaderStreet');

            btnClear.style.display = 'none';
            loader.style.display = 'block';
            ruaInput.disabled = true;

            try {
                const url = `https://viacep.com.br/ws/${uf}/${encodeURIComponent(city)}/Rua/json/`;
                const r = await fetch(url);
                const data = await r.json();

                loader.style.display = 'none';

                if (Array.isArray(data) && data.length === 1) {
                    selectAddressFromSearch(data[0]);
                    ruaInput.disabled = false;
                } else {
                    ruaInput.value = '';
                    ruaInput.disabled = false;
                    ruaInput.focus();
                    btnClear.style.display = 'none';
                    scrollToInput('searchRua');
                }
            } catch (e) {
                viacepApiStatus = "off";
                loader.style.display = 'none';
                ruaInput.value = '';
                ruaInput.disabled = false;
                ruaInput.focus();
            }
        }

        function handleStreetFocus(el) { scrollToInput('searchRua'); }

        function handleStreetInput(el) {
            const val = el.value;
            const btnClear = document.getElementById('btnClearStreet');
            const loader = document.getElementById('loaderStreet');
            const suggestions = document.getElementById('streetSuggestions');
            const uf = document.getElementById('inputUFDisplay').value;
            const city = document.getElementById('searchCidade').value;

            if (searchTimeout) clearTimeout(searchTimeout);

            if (val.length >= 3 && uf && city) {
                loader.style.display = 'block';
                btnClear.style.display = 'none';
                suggestions.style.display = 'none';
                scrollToInput('searchRua');
                searchTimeout = setTimeout(() => execStreetSearch(uf, city, val), 800);
            } else {
                loader.style.display = 'none';
                btnClear.style.display = val.length > 0 ? 'flex' : 'none';
                if (val.length === 0) { suggestions.style.display = 'none'; }
            }
        }

        function clearStreetField() {
            const input = document.getElementById('searchRua');
            input.value = '';
            document.getElementById('streetSuggestions').style.display = 'none';
            document.getElementById('btnClearStreet').style.display = 'none';
            document.getElementById('btnExecSearch').disabled = true;
            input.focus();
        }

        async function execStreetSearch(uf, city, streetFragment) {
            const currentVal = document.getElementById('searchRua').value;
            if (currentVal !== streetFragment) return;

            const suggestions = document.getElementById('streetSuggestions');
            const loader = document.getElementById('loaderStreet');
            const btnClear = document.getElementById('btnClearStreet');

            try {
                const url = `https://viacep.com.br/ws/${uf}/${encodeURIComponent(city)}/${encodeURIComponent(streetFragment)}/json/`;
                const r = await fetch(url);
                const data = await r.json();

                if (document.getElementById('searchRua').value !== streetFragment) return;

                searchFailureCount = 0; // Zera se der sucesso

                suggestions.innerHTML = '';

                if (!Array.isArray(data) || data.length === 0) {
                    suggestions.innerHTML = '<div class="suggestion-item"><i>Nenhum endereço encontrado.</i></div>';
                    suggestions.style.display = 'block';
                } else {
                    data.forEach(addr => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        const ruaTexto = (addr.logradouro && addr.logradouro.trim() !== "") ? addr.logradouro : "Sem nome";
                        const bairroTexto = (addr.bairro && addr.bairro.trim() !== "") ? addr.bairro : "Sem bairro";
                        div.innerHTML = `
<span class="search-cep-item">${addr.cep}</span>
<span style="font-size:14px; color:#333;">${ruaTexto}, ${bairroTexto}</span>
`;
                        div.onclick = (e) => {
                            e.stopPropagation();
                            selectAddressFromSearch(addr);
                        };
                        suggestions.appendChild(div);
                    });
                    suggestions.style.display = 'block';
                    scrollToInput('searchRua');
                }

            } catch (e) {
                if (document.getElementById('searchRua').value !== streetFragment) return;
                handleSearchError('street', { uf: uf, city: city, fragment: streetFragment });
            } finally {
                if (document.getElementById('searchRua').value === streetFragment) {
                    loader.style.display = 'none';
                    if (document.getElementById('searchRua').value.length > 0) {
                        btnClear.style.display = 'flex';
                    }
                }
            }
        }

        function selectAddressFromSearch(addrData) {
            storedCepRaw = addrData.cep.replace(/\D/g, '');
            storedCepFormatted = addrData.cep;

            const ruaTexto = (addrData.logradouro && addrData.logradouro.trim() !== "") ? addrData.logradouro : "Sem nome";
            const bairroTexto = (addrData.bairro && addrData.bairro.trim() !== "") ? addrData.bairro : "Sem bairro";
            document.getElementById('searchRua').value = `${addrData.cep}, ${ruaTexto}, ${bairroTexto}`;
            document.getElementById('btnClearStreet').style.display = 'flex';
            document.getElementById('streetSuggestions').style.display = 'none';
            selectedSearchResult = {
                ...addrData,
                logradouro: ruaTexto,
                bairro: bairroTexto
            };
            document.getElementById('btnExecSearch').disabled = false;
            document.getElementById('searchRua').blur();
        }

        function proceedFromSearch() {
            if (selectedSearchResult) {
                fillFormAndContinue(selectedSearchResult);
            }
        }

        function resetSearchScreen() {
            const ufInput = document.getElementById('inputUFDisplay');
            const cityInput = document.getElementById('searchCidade');
            const ruaInput = document.getElementById('searchRua');
            ufInput.value = '';
            cityInput.value = '';
            ruaInput.value = '';
            ruaInput.placeholder = "Mínimo 3 letras";
            document.getElementById('stateList').style.display = 'none';
            document.getElementById('citySuggestions').style.display = 'none';
            document.getElementById('streetSuggestions').style.display = 'none';
            document.getElementById('btnClearStreet').style.display = 'none';

            const btnExec = document.getElementById('btnExecSearch');
            btnExec.disabled = true;
            btnExec.innerText = CONFIG.text.search.btn; // Reseta texto do botão de erro
            btnExec.onclick = proceedFromSearch; // Reseta ação
            searchFailureCount = 0; // Zera contador

            cityInput.disabled = true;
            ruaInput.disabled = true;
            ufInput.focus();
            scrollToInput('inputUFDisplay');
        }

        document.body.addEventListener('touchmove', function (e) {
            const isContent = e.target.closest('.form-content');
            const isFooter = e.target.closest('.footer-actions');
            const isModal = e.target.closest('.modal-box');
            const isSuggestion = e.target.closest('.autocomplete-suggestions');

            if (!isContent && !isFooter && !isModal && !isSuggestion) {
                e.preventDefault();
            }
        }, { passive: false });

        function handleUserCepClick(el) {
            if (!isAutoClick) {
                const btn = document.getElementById('btnCepContinuar');
                const errorMsg = document.getElementById('cepFeedback');

                apiFailureCount = 0;
                btn.onclick = fetchCep;
                btn.innerHTML = CONFIG.text.step0.btn;

                el.classList.remove('input-error');
                if (errorMsg) {
                    errorMsg.style.display = 'none';
                    errorMsg.innerText = "";
                }

                validateStep0();
            }
        }
    </script>
</body>

</html>
