<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>In-App 01 - Entre em contato com nossa equipe</title>

  <style>
        /* ==========================================================
           VARIÁVEIS DE LAYOUT (específicas deste inapp)
           ========================================================== */
    :root {
      --header-padding-top: 28px;
      --badge-spacing-bottom: 20px;
    }

    /* ==========================================================
           ESTRUTURA E LAYOUT
           ========================================================== */

    * {
      box-sizing: border-box;
    }

    body,
    html {
      font-family: var(--font-secundaria);
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- CARD --- */
    .card {
      background: var(--Brand-Neutral-White);
      width: 88%;
      max-width: 350px;
      border-radius: var(--Radius-16);
      overflow: hidden;
      /* Sombra fixa solicitada */
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    .header {
      position: relative;
      width: 100%;
      padding-top: var(--header-padding-top);
      /* Este template usa fundo branco no header */
      background-color: var(--Brand-Neutral-White);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Badge Logic */
    .badge {
      background-color: var(--App-Highlights-Alert);
      color: var(--App-Interaction-Primary-Text);

      font-family: var(--font-secundaria);
      font-size: 10px;
      font-weight: 700;

      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 16px;
      border-radius: var(--Radius-4);
      margin-bottom: var(--badge-spacing-bottom);

      display: none;
    }

    .header-title {
      color: var(--App-Interaction-Primary-Text);
      width: 80%;
      margin: 0 0 20px 0;
      line-height: 1.1;
    }

    .illustration {
      width: 85%;
      max-width: 270px;
      height: auto;
      object-fit: contain;
      display: block;
      margin-bottom: 0;
    }

    /* --- BOTÃO FECHAR --- */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 0;
      text-decoration: none;
    }

    .close-icon-img {
      width: 24px;
      height: 24px;
      opacity: 0.5;
      display: block;
    }

    /* --- CONTEÚDO --- */
    .content {
      padding: var(--Spacing-24);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--Spacing-24);
    }

    .description {
      color: var(--App-Interaction-Primary-Text);
      text-align: center;
      margin: 0;
    }

    /* --- BOTÃO CTA --- */
    .cta-button {
      /* Cor e Forma */
      background-color: var(--App-Buttons-Primary-Action);
      color: var(--App-Buttons-On-Primary-Action);
      border-radius: var(--Radius-100);

      /* Layout */
      display: inline-block;
      padding: 12px 32px;
      text-align: center;
      text-decoration: none;

      /* Comportamento */
      box-shadow: none;
      transition: opacity 0.2s;
      text-transform: none;

      /* OBS: A tipografia virá da classe .body-2-bold no HTML */
    }

    .cta-button:active {
      opacity: 0.8;
    }

    strong,
    b {
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="header">
      <div id="closeButton" class="close-btn" role="button" tabindex="0">
        <img id="uiCloseIcon" src="" alt="Fechar" class="close-icon-img">
      </div>

      <div id="uiBadge" class="badge"></div>

      <h1 id="uiTitle" class="header-title heading-4-regular"></h1>

      <img id="uiImage" src="" alt="Ilustração Bloqueio" class="illustration">
    </div>

    <div class="content">
      <p id="uiDescription" class="description body-1-regular"></p>

      <a href="#" id="ctaButton" class="cta-button body-2-bold"></a>
    </div>
  </div>

<script>
      // =================================================================
      // [ÁREA DE CONFIGURAÇÃO DE CONTEÚDO]
      // =================================================================

      const CONFIG = {
        // CONFIGURAÇÃO DE COMPORTAMENTO POR SISTEMA
        // Opções disponíveis: 'deeplink', 'external', 'close'
        actions: {
          android: 'external', 
          ios: 'external'      
        },

        images: {
          main: "https://app.payjoy.com.br/images/inapp_entre-em-contato-com-nossa-equipe.svg",
          closeIcon: "https://assets.novucard.com.br/images/icon_x.svg"
        },
        text: {
          badge: "",
          title: "Entre em contato com nossa equipe",
          description: "Não conseguimos entregar seu cartão. Clique no botão abaixo e combine uma nova entrega."
        },
        button: {
          label: "Falar com um atendente",
          url: "https://altb.co/cx-wa-payjoy",
          eventName: "button_clicked_falar-com-um-atendente"
        },

        // --- Analytics (Motor de Eventos Customizados - Pronto para o futuro) ---
        analytics: {
          enabled: false, // Mude para true quando quiser começar a disparar o evento customizado
          eventName: "Inapp_Template_Generico",
          params: {
            clickedCta: "clicou-cta" 
            // Adicione novos parâmetros aqui futuramente se precisar
          }
           }
      };

      // =================================================================
      // [SETUP VISUAL]
      // =================================================================

      function setupTemplate() {
        document.getElementById('uiImage').src = CONFIG.images.main;
        document.getElementById('uiCloseIcon').src = CONFIG.images.closeIcon;

        const badgeEl = document.getElementById('uiBadge');
        if (CONFIG.text.badge && CONFIG.text.badge.trim() !== "") {
          badgeEl.innerText = CONFIG.text.badge;
          badgeEl.style.display = "inline-block";
        } else {
          badgeEl.style.display = "none";
        }

        document.getElementById('uiTitle').innerHTML = CONFIG.text.title;
        document.getElementById('uiDescription').innerHTML = CONFIG.text.description;

        const btn = document.getElementById('ctaButton');
        btn.innerText = CONFIG.button.label;
        btn.href = CONFIG.button.url;
        btn.setAttribute("data-wzrk-c2a", CONFIG.button.eventName);
      }

        // =================================================================
        // DS INJECTION — não edite esta seção
        // =================================================================
        var DS_ID  = 'payjoy-ds';
        var DS_URL = 'https://raw.githubusercontent.com/altbank-repo/assets/main/clevertap/inapps/payjoy/DS-payjoy.css';

        function initInapp() {
          setupTemplate();
          setupListeners();
        }

        if (!document.getElementById(DS_ID)) {
          fetch(DS_URL + '?t=' + Date.now())
            .then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.text();
            })
            .then(function (css) {
              var style = document.createElement('style');
              style.id = DS_ID;
              style.textContent = css;
              document.head.appendChild(style);
            })
            .catch(function (e) {
              console.error('[Inapp] Falha ao carregar DS:', e);
            })
            .finally(function () {
              initInapp();
            });
        } else {
          initInapp();
        }

        function setupListeners() {

      // =================================================================
      // [CLEVERTAP HELPERS & MOTOR DE ANALYTICS]
      // =================================================================

      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      // [MOTOR] Função Universal de Tracking CleverTap (Android & iOS)
      var ctTrackEvent = function(eventName, props) {
          if (isIOS) {
              try {
                  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.clevertap) {
                      window.webkit.messageHandlers.clevertap.postMessage({
                          action: 'recordEventWithProps',
                          event: eventName,
                          properties: props // iOS aceita o objeto diretamente
                      });
                  }
              } catch (e) { console.error("Erro no tracking iOS", e); }
          } else {
              try {
                  if (window.CleverTap && typeof window.CleverTap.pushEvent === "function") {
                      // Android exige a stringificação das propriedades
                      window.CleverTap.pushEvent(eventName, JSON.stringify(props));
                  }
              } catch (e) { console.error("Erro no tracking Android", e); }
          }
      };

      // Função responsável por montar e disparar o evento, caso habilitado
      var flushFinalEvents = function (isCtaClick) {
        if (CONFIG.analytics && CONFIG.analytics.enabled) {
          var props = {};
          props[CONFIG.analytics.params.clickedCta] = !!isCtaClick;
          // Insira lógicas de outras variáveis aqui no futuro

          ctTrackEvent(CONFIG.analytics.eventName, props);
        }
      };

      var ctDismiss = function () {
        try {
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.clevertap) {
            window.webkit.messageHandlers.clevertap.postMessage({ action: 'dismissInAppNotification' });
            return true;
          }
        } catch (e) {}
        try {
          if (window.CleverTap && typeof window.CleverTap.dismissInAppNotification === "function") {
            window.CleverTap.dismissInAppNotification();
            return true;
          }
        } catch (e) {}
        return false;
      };

      var ctTriggerAction = function (url, c2a, btnId, isTrackingOnly) {
        try {
          if (window.CleverTap && typeof window.CleverTap.triggerInAppAction === "function") {
            var kvData = isTrackingOnly ? {} : { "wzrk_dl": url };
            var actionJson = { "type": "kv", "kv": kvData };
            window.CleverTap.triggerInAppAction(JSON.stringify(actionJson), c2a, btnId);
            return true;
          }
        } catch (e) { }
        return false;
      };

      // =================================================================
      // [LISTENERS DE CLIQUE]
      // =================================================================

      // BOTÃO FECHAR (X)
      document.getElementById("closeButton")?.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        
        flushFinalEvents(false); // Chama o motor de analytics (false = não foi o CTA)
        
        setTimeout(function() {
          ctDismiss();
        }, 150);
      });

      // BOTÃO CTA (PRIMÁRIO)
      document.getElementById("ctaButton")?.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();

        flushFinalEvents(true); // Chama o motor de analytics (true = foi o CTA)

        var url = this.getAttribute("href");
        var c2a = this.getAttribute("data-wzrk-c2a");
        var actionType = isIOS ? CONFIG.actions.ios : CONFIG.actions.android;

        // ---------------------------------------------------------
        // LÓGICA IOS
        // ---------------------------------------------------------
        if (isIOS) {
          if (actionType === 'external') {
            var newWindow = window.open(url, '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
              setTimeout(function() { window.location.href = url; }, 150);
            }
            setTimeout(function () {
              window.location.href = "wzrk://?wzrk_c2a=" + encodeURIComponent(c2a);
            }, 1000);
          }
          else if (actionType === 'close') {
            setTimeout(function() { 
              window.location.href = "wzrk://?wzrk_c2a=" + encodeURIComponent(c2a); 
            }, 150);
          }
          else {
            // Version 1 única
            if (ctTriggerAction(url, c2a, "ctaButton", false)) {
              setTimeout(function () { ctDismiss(); }, 150);
            } else {
              setTimeout(function() { window.location.href = url; }, 150);
            }
          }
        } 
        // ---------------------------------------------------------
        // LÓGICA ANDROID
        // ---------------------------------------------------------
        else {
          if (actionType === 'external') {
            ctTriggerAction(url, c2a, "ctaButton", true);
            
            var newWindow = window.open(url, '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
              setTimeout(function() { window.top.location.href = url; }, 150);
            }
            
            setTimeout(function () { ctDismiss(); }, 1500);
          }
          else if (actionType === 'deeplink') {
            if (ctTriggerAction(url, c2a, "ctaButton", false)) { 
              setTimeout(function () { ctDismiss(); }, 150);
            }
          }
          else {
            ctTriggerAction(url, c2a, "ctaButton", true);
            setTimeout(function () { ctDismiss(); }, 150);
          }
        }
      });

        } // end setupListeners
  </script>
</body>

</html>
